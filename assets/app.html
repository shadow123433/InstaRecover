<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperação</title>

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <main class="container">

    <h1>Assistente de Recuperação</h1>
    <p class="subtitle">Responda algumas perguntas para gerar seu plano</p>

    <p class="progress">Etapa <span id="step-indicator">1</span> de 3</p>

    <!-- STEP 1 -->
    <div id="step1" class="card">
      <h2>Qual é o seu problema?</h2>
      <button class="btn" data-problem="hack">Conta hackeada</button>
      <button class="btn" data-problem="senha">Esqueci a senha</button>
      <button class="btn" data-problem="email">Perdi o e-mail</button>
      <a href="index.html" class="btn-secondary" style="display: block; margin-top: 1.5rem;">Voltar para o início</a>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="card hidden">
      <h2>Você ainda tem acesso ao e-mail?</h2>
      <button class="btn" data-answer="sim">Sim</button>
      <button class="btn" data-answer="nao">Não</button>

      <button class="btn-secondary" onclick="goBack()">Voltar</button>
    </div>

    <!-- RESULT -->
    <div id="result" class="card hidden">
      <h2>Plano de recuperação</h2>

      <div class="result-box">
        <div id="output"></div>
      </div>

      <button class="btn-secondary" onclick="resetFlow()">Recomeçar</button>
    </div>

  </main>

  <script src="/js/ui.js"></script>
  <script src="/js/flow.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
